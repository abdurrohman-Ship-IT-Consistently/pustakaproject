<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Konfirmasi Hapus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex justify-center items-center min-h-screen">
    <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm border border-slate-200 text-center">
        <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">!</div>
        <h2 class="text-lg font-bold text-slate-800 mb-2">Hapus Data Buku?</h2>
        <p class="text-slate-500 text-sm mb-6">Apakah Anda yakin ingin menghapus buku <strong class="text-slate-800">"{{ buku.judul }}"</strong>? Tindakan ini tidak dapat dibatalkan.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-center space-x-2">
                <a href="{% url 'buku_list' %}" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-600 hover:bg-slate-50 text-sm font-medium">Batal</a>
                <button type="submit" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-sm font-medium">Ya, Hapus Data</button>
            </div>
        </form>
    </div>
</body>
</html>
