<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Buku</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 sm:p-8 min-h-screen flex justify-center items-start sm:items-center">

    <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-sm w-full max-w-xl border border-slate-200">
        <h2 class="text-xl font-bold text-slate-800 mb-6">Edit Buku (ID: {{ buku.id }})</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Pengarang</label>
                    <input type="text" name="pengarang" value="{{ buku.pengarang }}" required class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
                <div class="relative">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                    <select name="kategori" class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-white appearance-none cursor-pointer">
                        {% for kat in pilihan_kategori %}
                            <option value="{{ kat }}" {% if kat == buku.kategori %}selected{% endif %}>{{ kat }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Penerbit</label>
                    <input type="text" name="penerbit" value="{{ buku.penerbit }}" required class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Terbit</label>
                    <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="relative">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Lokasi Rak</label>
                    <select name="rak" class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-white appearance-none cursor-pointer">
                        {% for r in pilihan_rak %}
                            <option value="{{ r }}" {% if r == buku.rak %}selected{% endif %}>{{ r }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Stok Jumlah</label>
                    <input type="number" name="stok" value="{{ buku.stok }}" required class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi Ringkas</label>
                <textarea name="deskripsi" rows="3" class="w-full border border-slate-300 p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">{{ buku.deskripsi }}</textarea>
            </div>

            <div class="pt-4 flex flex-col sm:flex-row justify-end gap-3">
                <button type="submit" class="w-full sm:w-auto px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium text-sm transition">Update Data</button>
                <a href="{% url 'buku_list' %}" class="w-full sm:w-auto px-6 py-2.5 border border-slate-300 rounded-xl text-slate-600 hover:bg-slate-50 text-center font-medium text-sm transition">Batal</a>
            </div>
        </form>
    </div>
</body>
</html>
