<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Hapus User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white border border-slate-100 rounded-2xl shadow-sm p-6 sm:p-8 text-center">
        <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-rose-50 text-rose-500 mb-5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h2 class="text-lg font-bold text-slate-800">Hapus Data User?</h2>
        <p class="text-xs text-slate-500 mt-2 px-2 leading-relaxed">
            Apakah Anda yakin ingin menghapus user <span class="font-semibold text-slate-800">"{{ user.nama }}"</span>? Tindakan ini tidak dapat dibatalkan.
        </p>

        <form method="POST" class="mt-8 flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-3 rounded-xl text-xs font-semibold shadow-sm transition">
                Ya, Hapus Permanen
            </button>
            
            <a href="{% url 'user_list' %}" class="w-full bg-white hover:bg-slate-50 text-slate-600 py-3 rounded-xl text-xs font-semibold transition border border-slate-200">
                Batalkan
            </a>
        </form>
    </div>

</body>
</html>
