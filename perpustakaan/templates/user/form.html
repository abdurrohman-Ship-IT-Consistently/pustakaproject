<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - {{ action }} User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white border border-slate-100 rounded-2xl shadow-sm p-8">
        <div class="mb-6">
            <h2 class="text-xl font-bold text-slate-800">{{ action }} Data User</h2>
            <p class="text-xs text-slate-400 mt-1">Lengkapi informasi berkas pendaftaran user perpustakaan.</p>
        </div>

        {% if error_message %}
        <div class="bg-rose-50 border border-rose-100 text-rose-600 text-xs font-semibold p-3.5 rounded-xl mb-5">
            ⚠ {{ error_message }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Nama Lengkap</label>
                <input type="text" name="nama" value="{{ user.nama|default:'' }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-xs font-medium focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Kelas</label>
                <input type="text" name="kelas" value="{{ user.kelas|default:'' }}" placeholder="Contoh: XI IPA 1" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-xs font-medium focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Nomor Induk Siswa (NIS)</label>
                <input type="text" name="nis" value="{{ user.nis|default:'' }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-xs font-mono font-medium focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Status Aktif User</label>
      <select name="is_active" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-xs font-medium focus:outline-none focus:border-blue-500 transition">
        <option value="True" {% if user.is_active == True or user.is_active is None %}selected{% endif %}>Aktif</option>
        <option value="False" {% if user.is_active == False %}selected{% endif %}>Tidak Aktif</option>
      </select>
            </div>

            <div class="pt-4 flex justify-end space-x-2">
                <a href="{% url 'user_list' %}" class="px-4 py-2.5 text-xs font-semibold text-slate-500 hover:bg-slate-50 rounded-xl transition">Batal</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 text-xs font-semibold rounded-xl shadow-sm transition">Simpan Berkas</button>
            </div>
        </form>
    </div>

</body>
</html>
