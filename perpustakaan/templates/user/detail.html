<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Detail User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 sm:p-8 flex justify-center items-start min-h-screen">
    
    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm w-full max-w-sm border border-slate-100">
        <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-6 border border-blue-100">
            {{ user.nama|slice:":2"|upper }}
        </div>
        
        <h2 class="text-lg font-bold text-slate-800 text-center mb-8">Detail Profil User</h2>
        
        <div class="space-y-5 text-sm">
            <div class="grid grid-cols-1 gap-1">
                <span class="font-bold text-slate-400 uppercase text-[10px] tracking-wider">Nama Lengkap</span>
                <span class="text-slate-800 font-semibold text-base">{{ user.nama }}</span>
            </div>
            
            <div class="grid grid-cols-1 gap-1">
                <span class="font-bold text-slate-400 uppercase text-[10px] tracking-wider">Kelas</span>
                <span class="text-slate-600 font-medium">{{ user.kelas }}</span>
            </div>
            
            <div class="grid grid-cols-1 gap-1">
                <span class="font-bold text-slate-400 uppercase text-[10px] tracking-wider">Nomor Induk Siswa (NIS)</span>
                <span class="text-slate-600 font-mono font-medium">{{ user.nis }}</span>
            </div>
            
            <div class="grid grid-cols-1 gap-1">
                <span class="font-bold text-slate-400 uppercase text-[10px] tracking-wider">Status Akun</span>
                <div>
                    {% if user.is_active %}
                    <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-lg uppercase tracking-wide">Aktif</span>
                    {% else %}
                    <span class="px-3 py-1 bg-rose-50 text-rose-600 text-[10px] font-bold rounded-lg uppercase tracking-wide">Non-Aktif</span>
                    {% endif %}
                </div>
            </div>
        </div>
        
        <div class="mt-8">
            <a href="{% url 'user_list' %}" class="block w-full text-center py-3 bg-slate-800 hover:bg-slate-900 text-white text-xs font-semibold rounded-xl shadow-sm transition">
                Kembali ke Daftar
            </a>
        </div>
    </div>

</body>
</html>
