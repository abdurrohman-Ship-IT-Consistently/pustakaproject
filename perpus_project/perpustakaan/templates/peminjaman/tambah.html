<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Peminjaman Buku</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex justify-center items-center min-h-screen">
    <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-md border border-slate-200">
        <h2 class="text-xl font-bold text-slate-800 mb-2">Formulir Peminjaman Buku</h2>
        <p class="text-xs text-slate-500 mb-6">Pastikan siswa berstatus aktif dan stok buku mencukupi.</p>
        
        {% if messages %}
            {% for msg in messages %}
                <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-xs font-semibold">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Pilih Siswa (Peminjam)</label>
                <select name="siswa_id" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-white">
                    <option value="" disabled selected>-- Pilih Anggota Siswa --</option>
                    {% for s in daftar_siswa %}
                        <option value="{{ s.id }}">{{ s.nama }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Pilih Buku</label>
                <select name="buku_id" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm bg-white">
                    <option value="" disabled selected>-- Pilih Judul Buku (Tersedia) --</option>
                    {% for b in daftar_buku %}
                        <option value="{{ b.id }}">{{ b.judul }} (Sisa Stok: {{ b.stok }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Pinjam</label>
                    <input type="date" name="tanggal_pinjam" required class="w-full border border-slate-300 p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Harus Kembali</label>
                    <input type="date" name="jatuh_tempo" required class="w-full border border-slate-300 p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Keperluan / Keterangan</label>
                <textarea name="keperluan" placeholder="Contoh: Tugas Resensi Bahasa Indonesia" rows="2" class="w-full border border-slate-300 p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
            </div>
            <div class="flex justify-end space-x-2 pt-4">
                <a href="{% url 'peminjaman_list' %}" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-600 text-sm hover:bg-slate-50 font-medium">Batal</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 font-medium">Konfirmasi Pinjam</button>
            </div>
        </form>
    </div>
</body>
</html>
