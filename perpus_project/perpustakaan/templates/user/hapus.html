<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Hapus User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm bg-white border border-slate-100 rounded-2xl shadow-sm p-8 text-center">
        <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-rose-50 text-rose-600 text-2xl mb-4">
            ⚠️
        </div>

        <h2 class="text-lg font-bold text-slate-800">Hapus Data User?</h2>
        <p class="text-xs text-slate-400 mt-2 px-2">
            Apakah Anda yakin ingin menghapus user <span class="font-semibold text-slate-800">"{{ user.nama }}"</span>? Tindakan ini tidak dapat dibatalkan.
        </p>

        <form method="POST" class="mt-6 flex flex-col space-y-2">
            {% csrf_token %}
            <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-2.5 rounded-xl text-xs font-semibold shadow-sm shadow-rose-600/10 transition">
                Ya, Hapus Permanen
            </button>
            <a href="{% url 'user_list' %}" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-600 py-2.5 rounded-xl text-xs font-semibold transition border border-slate-100">
                Batalkan
            </a>
        </form>
    </div>

</body>
</html>
